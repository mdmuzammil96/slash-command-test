name: PR Test Command

on:
  issue_comment:
    types: [created]
  pull_request:
    branches:
      - development

jobs:
  run-tests:
    name: Run test cases

    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/test')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Dummy test
        run: |
          echo "Running dummy tests..."
          sleep 5
          echo "Tests passed!"
